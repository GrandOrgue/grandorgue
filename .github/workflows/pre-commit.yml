
name: pre-commit

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # load full history for nanoufo/copyright-hook pre-commit hook
          fetch-depth: 0
      - uses: actions/setup-python@v5.5.0
        with:
          python-version: 3.12
      - uses: pre-commit/action@v3.0.1
